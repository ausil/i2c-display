name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: linux
            goarch: arm
            goarm: 7
            suffix: linux-armv7
          - goos: linux
            goarch: riscv64
            suffix: linux-riscv64
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Fetch all history including tags for version detection

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          if [ "${{ matrix.goarch }}" = "arm" ] || [ "${{ matrix.goarch }}" = "riscv64" ]; then
            make build GOBUILD="go build"
          else
            make build
          fi
          mv bin/i2c-displayd bin/i2c-displayd-${{ matrix.suffix }}

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          name: i2c-displayd-${{ matrix.suffix }}
          path: bin/i2c-displayd-${{ matrix.suffix }}

  build-tarball:
    name: Build source tarball
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Build source tarball
        run: make dist

      - name: Upload tarball
        uses: actions/upload-artifact@v7
        with:
          name: source-tarball
          path: dist/*.tar.gz

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-tarball]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8

      - name: Generate changelog
        id: changelog
        run: |
          # Extract version from tag
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Extract the changelog section for this version from CHANGELOG.md.
          # Prints lines between "## [VERSION]" and the next "## [" heading.
          CHANGELOG=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release v${{ steps.changelog.outputs.version }}
          body: |
            # I2C Display Controller v${{ steps.changelog.outputs.version }}

            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Installation

            ### Binary downloads

            - `i2c-displayd-linux-arm64` - ARM64 (Raspberry Pi 4/5, Rock 3C/5B, Rock 5A, Orange Pi 3B)
            - `i2c-displayd-linux-armv7` - ARMv7 (Raspberry Pi 2/3/Zero 2W)
            - `i2c-displayd-linux-amd64` - x86_64
            - `i2c-displayd-linux-riscv64` - RISC-V 64-bit

            ### Building packages locally

            ```bash
            # Fedora/RHEL
            sudo dnf install -y git golang rpm-build systemd-rpm-macros
            git clone https://github.com/ausil/i2c-display.git
            cd i2c-display
            make rpm
            sudo dnf install rpm-build/RPMS/*/i2c-display-*.rpm

            # Debian/Ubuntu/Raspberry Pi OS
            sudo apt-get install -y git golang debhelper devscripts dh-golang
            git clone https://github.com/ausil/i2c-display.git
            cd i2c-display
            make deb
            sudo apt install ../i2c-display_*.deb
            ```

            See [README.md](https://github.com/ausil/i2c-display/blob/main/README.md) for complete installation instructions.
          files: |
            i2c-displayd-linux-*/i2c-displayd-*
            source-tarball/*.tar.gz
          draft: false
          prerelease: false
